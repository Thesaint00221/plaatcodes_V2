<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaatcatalogus</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">

    <div class="logo">

        <div class="logoIcon">🪵</div>

        <div class="logoTekst">
            <h1>Plaatcodes</h1>
            <span>Alle leveranciers op één plaats</span>
        </div>

    </div>

    <div class="zoekContainer">

        <span class="zoekIcon">🔍</span>

        <input
            id="search"
            type="text"
            placeholder="Zoek op naam, plaatcode, leverancier..."
        >

    </div>

    <div class="headerButtons">
    <div id="loginBox"></div>
        <a href="upload.html" class="uploadKnop">
            Upload
        </a>

    </div>

</header>


    <div id="resultaten"></div>
<div id="detail" class="hidden">

    <button id="terug">← Terug</button>

    <div id="detailContent"></div>
<div id="uploadKaart">

    <button id="detailKnop" class="uploadKnop detail">

        🔍 DETAILFOTO

        <span>
            Beschadiging - structuur - fout
        </span>

    </button>


    <button id="overzichtKnop" class="uploadKnop overzicht">

        🖼 OVERZICHTSFOTO

        <span>
            Volledige plaat
        </span>

    </button>


<input
    type="file"
    id="detailBestand"
    accept="image/*"
    capture="environment"
    hidden>

<input
    type="file"
    id="overzichtBestand"
    accept="image/*"
    capture="environment"
    hidden>


   <div class="uploadVeld">

    <label>
        Titel
    </label>

    <input 
        id="fotoTitel"
        placeholder="Geef een korte titel...">

</div>


<div class="uploadVeld">

    <label>
        Opmerking
    </label>

    <textarea 
        id="fotoBeschrijving"
        placeholder="Beschrijf de beschadiging, fout of bijzonderheid..."></textarea>

</div>
    <button id="opslaanFoto">

        ✔ Opslaan

    </button>

</div>
    <div id="beheerBox" style="display:none;">

    <button id="opschonenButton">
        🧹 Opschonen opslag
    </button>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/detail.js"></script>
<script src="js/catalogus.js"></script>
<script src="js/upload.js"></script>
<script src="js/opschonen.js"></script>
<script src="js/app.js"></script>
</body>
</html>
