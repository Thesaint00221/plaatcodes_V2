<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Plaatcatalogus</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- =========================
HEADER
========================== -->

<header class="topbar">

    <div class="logo">

        <div class="logoIcon">🪵</div>

        <div class="logoTekst">

            <h1>Plaatcodes</h1>
            <span>Alle leveranciers op één plaats</span>

        </div>

    </div>


    <div class="zoekContainer">

        <input
            id="search"
            type="text"
            placeholder="Zoek op naam, plaatcode of leverancier">

    </div>


    <div class="headerButtons">


        <!-- AANMELDEN / GEBRUIKERSMENU -->
        <div id="loginBox" class="loginArea"></div>



        <!-- NIEUWE PLAAT -->

        <button
            id="nieuwePlaatKnop"
            class="primary"
            style="display:none;">

            ➕ Nieuwe plaat

        </button>


    </div>


</header>
<!-- =========================
CATALOGUS
========================== -->

<main>

    <div id="resultaten" class="cards"></div>

</main>

<!-- =========================
DETAILPAGINA
========================== -->

<section id="detail" class="hidden">

    <button id="terug">

        ← Terug

    </button>

    <div id="detailContent"></div>

    <div id="uploadKaart">

        <button
            id="detailKnop"
            class="uploadKnop detail">

            🔍 Detailfoto

        </button>

        <button
            id="overzichtKnop"
            class="uploadKnop overzicht">

            🖼 Overzichtsfoto

        </button>

        <input
            type="file"
            id="detailBestand"
            accept="image/*"
            capture="environment"
            hidden>

        <input
            type="file"
            id="overzichtBestand"
            accept="image/*"
            capture="environment"
            hidden>

        <div class="uploadForm">

            <label>Titel</label>

            <input
                id="fotoTitel"
                type="text"
                maxlength="80">

            <label>Opmerking</label>

            <textarea
                id="fotoBeschrijving"
                rows="5"></textarea>

            <button id="opslaanFoto">

                ✔ Opslaan

            </button>

        </div>

    </div>

    <div
        id="beheerBox"
        style="display:none;">

        <button id="opschonenButton">

            🧹 Opschonen opslag

        </button>

    </div>

</section>

<!-- =========================
SCRIPTS
========================== -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/catalogus.js"></script>
<script src="js/detail.js"></script>
<script src="js/upload.js"></script>
<script src="js/opschonen.js"></script>
<script src="js/app.js"></script>

</body>
</html>
