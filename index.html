<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Plaatcatalogus</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- =========================
HEADER
========================== -->

<header class="topbar">

    <div class="logo">

        <div class="logoIcon">🪵</div>

        <div class="logoTekst">

            <h1>Plaatcodes</h1>
            <span>Alle leveranciers op één plaats</span>

        </div>

    </div>


    <div class="zoekContainer">

        <input
            id="search"
            type="text"
            placeholder="Zoek op naam, plaatcode of leverancier">

    </div>


    <div class="headerButtons">


        <!-- AANMELDEN / GEBRUIKERSMENU -->
        <div id="loginBox" class="loginArea"></div>



        <!-- NIEUWE PLAAT -->

        <button
            id="nieuwePlaatKnop"
            class="primary"
            style="display:none;">

            ➕ Nieuwe plaat

        </button>

<button
    id="archiefKnop"
    class="secundaireKnop"
    style="display:none;">

    📦 Archief

</button>
    </div>


</header>
<!-- =========================
CATALOGUS
========================== -->

<main>

    <div id="resultaten" class="cards"></div>

</main>

<section
    id="plaatModal"
    class="plaatModal hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="plaatModalTitel">

    <form id="nieuwePlaatForm" class="plaatForm">
        <div class="plaatFormKop">
            <div>
                <p class="beheerEyebrow">Beheer</p>
                <h2 id="plaatModalTitel">Nieuwe plaat toevoegen</h2>
                <p>De plaat wordt onmiddellijk in de catalogus opgeslagen.</p>
            </div>
            <button id="sluitPlaatModal" class="modalSluiten" type="button" aria-label="Sluiten">×</button>
        </div>

        <div class="plaatFormGrid">
            <label>Naam<input id="plaatNaam" type="text" required></label>
            <label>Code<input id="plaatCode" type="text" required></label>
            <label>Leverancier<input id="plaatLeverancier" type="text" required></label>
            <label>Referentie<input id="plaatReferentie" type="text"></label>
            <label>Kleur<input id="plaatKleur" type="text"></label>
            <label>Kleurnummer<input id="plaatKleurnummer" type="number" step="1"></label>
            <label class="plaatFotoVeld">Foto <input id="plaatFoto" type="file" accept="image/*"></label>
        </div>

        <p id="plaatFormMelding" class="plaatFormMelding" aria-live="polite"></p>

        <div class="plaatFormActies">
            <button id="annuleerPlaat" class="secundaireKnop" type="button">Annuleren</button>
            <button class="primary" type="submit">Plaat opslaan</button>
        </div>
    </form>
</section>

    <section id="archiefPagina" class="hidden">

    <button id="sluitArchief">

        ← Terug

    </button>

    <h2>Gearchiveerde platen</h2>

    <div id="archiefResultaten" class="cards"></div>

</section>
<!-- =========================
DETAILPAGINA
========================== -->

<section id="detail" class="hidden">

    <button id="terug">

        ← Terug

    </button>

    <div id="detailContent"></div>

    <div id="uploadKaart">

        <button
            id="detailKnop"
            class="uploadKnop detail">

            🔍 Detailfoto

        </button>

        <button
            id="overzichtKnop"
            class="uploadKnop overzicht">

            🖼 Overzichtsfoto

        </button>

        <input
            type="file"
            id="detailBestand"
            accept="image/*"
            capture="environment"
            hidden>

        <input
            type="file"
            id="overzichtBestand"
            accept="image/*"
            capture="environment"
            hidden>

        <div class="uploadForm">

            <div class="uploadFormKop">
                <h3>Nieuwe case toevoegen</h3>
                <p>Voeg een korte titel en toelichting toe bij de foto's.</p>
            </div>

            <div class="uploadVeld">
            <label for="fotoTitel">Titel</label>

            <input
                id="fotoTitel"
                type="text"
                maxlength="80"
                placeholder="Bijvoorbeeld: Keuken bij familie Janssens">
            <small>Maximaal 80 tekens.</small>
            </div>

            <div class="uploadVeld">
            <label for="fotoBeschrijving">Opmerking</label>

            <textarea
                id="fotoBeschrijving"
                rows="5"
                placeholder="Beschrijf kort de toepassing, afwerking of bijzonderheden."></textarea>
            <small>Deze toelichting verschijnt bij de case.</small>
            </div>

            <button id="opslaanFoto">

                ✔ Opslaan

            </button>

        </div>

    </div>

    <div
        id="beheerBox"
        style="display:none;">

        <button id="opschonenButton">

            🧹 Opschonen opslag

        </button>

    </div>

</section>

<!-- =========================
SCRIPTS
========================== -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/catalogus.js"></script>
<script src="js/detail.js"></script>
<script src="js/upload.js"></script>
<script src="js/opschonen.js"></script>
<script src="js/platen-beheer.js"></script>
<script src="js/archief.js"></script>
<script src="js/app.js"></script>

</body>
</html>
