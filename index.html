<div id="loginBox">

    <input
        type="email"
        id="email"
        placeholder="E-mailadres">

    <input
        type="password"
        id="wachtwoord"
        placeholder="Wachtwoord">

    <button id="loginButton">
        Aanmelden
    </button>

    <button
        id="logoutButton"
        style="display:none;">
        Afmelden
    </button>

</div>
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaatcatalogus</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Plaatcatalogus</h1>
        <p>Zoek op code, kleur of leverancier</p>
    </header>

    <div class="search">
        <input
            type="text"
            id="search"
            placeholder="Zoek een plaat..."
        >
    </div>

    <div id="resultaten"></div>
<div id="detail" class="hidden">

    <button id="terug">← Terug</button>

    <div id="detailContent"></div>
<button id="fotoToevoegen">
    📷 Foto toevoegen
</button>
    <div id="fotoFormulier" class="verborgen">

    <h3>Nieuwe foto</h3>

    <label>
        Categorie
    </label>

    <select id="categorie">
        <option>Structuur</option>
        <option>Herstelling</option>
        <option>Project</option>
        <option>Overige</option>
    </select>


    <label>
        Titel
    </label>

    <input id="fotoTitel">


    <label>
        Beschrijving
    </label>

    <textarea id="fotoBeschrijving"></textarea>


    <label>
        Foto
    </label>

    <input 
        type="file"
        id="fotoBestand"
        accept="image/*"
        capture="environment"
    >


    <button id="opslaanFoto">
        Opslaan
    </button>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/catalogus.js"></script>
<script src="js/auth.js"></script>
<script src="js/upload.js"></script>

<script src="js/app.js"></script>
</body>
</html>
